mixed-port: 7890
allow-lan: true
mode: rule
log-level: error

external-controller: 127.0.0.1:9090

dns:
  enable: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  nameserver:
    - https://dns.alidns.com/dns-query
    - https://1.1.1.1/dns-query

proxies:

  - name: HY2
    type: hysteria2
    server: taorobot.top
    port: 443
    password: 密码
    sni: taorobot.top
    skip-cert-verify: false
    udp: true
    up: 200
    down: 1000

  - name: Reality
    type: vless
    server: taorobot.top
    port: 443
    uuid: 服务端UID
    network: tcp
    tls: true
    flow: xtls-rprx-vision
    servername: www.microsoft.com
    client-fingerprint: chrome
    reality-opts:
      public-key: 服务端公钥
      short-id: 服务端自定义短ID(8位，0~F)

proxy-groups:

  - name: 自动切换
    type: fallback
    url: https://cp.cloudflare.com/generate_204
    interval: 300
    proxies:
      - HY2
      - Reality

  - name: 节点选择
    type: select
    proxies:
      - 自动切换
      - HY2
      - Reality
      - DIRECT
rules:
  - MATCH,节点选择
