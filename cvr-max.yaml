# =========================================================
# Clash Verge Rev 最终稳定版（保留关键注释）
# 版本：2025-03
# =========================================================

# --------- 基础配置 ---------
mixed-port: 7890
allow-lan: false                 # 开启局域网需同时设置 secret
mode: rule                       # rule: 按规则分流; global: 全局代理; direct: 全部直连
log-level: warning               # 调试时改为 info
ipv6: false                      # 多数节点不支援 IPv6
unified-delay: true              # 减少测速波动
tcp-concurrent: true             # 弱网下提升连接速度
external-controller: 127.0.0.1:9090
secret: "你的密钥"

# --------- TUN 模式（全流量劫持，无需系统代理）---------
# tun:
#   enable: false
#   stack: mixed                   # mixed: TCP用系统栈/UDP用gvisor，兼容性最佳
#   dns-hijack:
#     - any:53                     # 劫持所有DNS请求，防止泄漏
#   auto-route: true               # 自动添加路由表
#   auto-detect-interface: true    # 自动识别出口网卡
#   strict-route: false            # 与其他VPN共存时改为true
#   mtu: 1500

# --------- DNS 防泄漏（fake-ip + 国内外分离）---------
dns:
  enable: true
  ipv6: false
  listen: 0.0.0.0:1053
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  default-nameserver:            # 用于解析 nameserver 中的 DoH 域名
    - 223.5.5.5
    - 119.29.29.29
  nameserver:                    # 国内域名解析
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  fallback:                      # 国外域名解析（防污染）
    - https://cloudflare-dns.com/dns-query
    - tls://1.1.1.1:853
    - tls://8.8.8.8:853
  fallback-filter:
    geoip: true
    geoip-code: CN
    domain:                      # 这些域名强制走 fallback
      - "+.google.com"
      - "+.youtube.com"
      - "+.github.com"
      - "+.twitter.com"
      - "+.facebook.com"
      - "+.cloudflare.com"

# --------- 代理节点 ---------
proxies:
  - name: HY2                   # 不需要暴露自己时的选择
    type: hysteria2
    server: taorobot.top
    port: 443
    password: zsy3560
    sni: taorobot.top
    skip-cert-verify: true
    udp: true
    up: "200 Mbps"               # 后期可改为数字
    down: "1000 Mbps"            # 后期可改为数字

  - name: Reality                # 选择我可以隐藏好自己
    type: vless                  # VLESS + Reality 协议，隐蔽性强
    server: taorobot.top
    port: 443
    uuid: 服务端的UUID
    network: tcp
    tls: true
    udp: true
    flow: xtls-rprx-vision
    servername: www.microsoft.com   # 伪装域名，必须和服务端一样e.g. xmgl.glodon.com
    client-fingerprint: chrome
    packet-encoding: xudp
    reality-opts:
      public-key: 服务端的公钥
      short-id: 服务端自定义（0~F）8位ID

# --------- 策略组 ---------
proxy-groups:
  #- name: "自动优选"              # 每秒测速，自动选最低延迟节点
  #  type: url-test
  #  url: https://www.gstatic.com/generate_204
  #  interval: 300
  #  tolerance: 50
  #  disable-udp: true            # 测速仅用 TCP，避免 UDP 干扰
  #  proxies:
  #    - HY2
  #    - Reality

  - name: "故障转移"              # 顺序可用，当前节点失效自动切换
    type: fallback
    url: https://www.gstatic.com/generate_204
    interval: 300
    proxies:
      - HY2
      - Reality

  - name: "PROXY"                # 手动切换入口
    type: select
    proxies:
      - 自动优选
      - 故障转移
      - HY2
      - Reality
      - DIRECT

# --------- 在线规则集（Loyalsoldier，自动更新）---------
rule-providers:
  reject:
    type: http
    behavior: domain
    path: ./ruleset/reject.yaml
    url: https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/reject.txt
    interval: 86400
  direct:
    type: http
    behavior: domain
    path: ./ruleset/direct.yaml
    url: https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/direct.txt
    interval: 86400
  proxy:
    type: http
    behavior: domain
    path: ./ruleset/proxy.yaml
    url: https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/proxy.txt
    interval: 86400
  private:
    type: http
    behavior: ipcidr
    path: ./ruleset/private.yaml
    url: https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/private.txt
    interval: 86400
  apple:
    type: http
    behavior: domain
    path: ./ruleset/apple.yaml
    url: https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/apple.txt
    interval: 86400

# --------- 分流规则（从上到下匹配）---------
rules:
  - RULE-SET,reject,REJECT       # 广告域名直接拒绝
  - RULE-SET,private,DIRECT      # 内网地址直连
  - RULE-SET,direct,DIRECT       # 国内常见域名直连
  - RULE-SET,apple,PROXY         # Apple 服务走代理（可根据需要改为 DIRECT）
  - RULE-SET,proxy,PROXY         # 国外网站走代理
  - DOMAIN-SUFFIX,openai.com,PROXY
  - DOMAIN-SUFFIX,chatgpt.com,PROXY
  - DOMAIN-SUFFIX,anthropic.com,PROXY
  - DOMAIN-SUFFIX,claude.ai,PROXY
  - DOMAIN-SUFFIX,github.com,PROXY
  - DOMAIN-SUFFIX,githubusercontent.com,PROXY
  - GEOIP,CN,DIRECT              # 中国 IP 直连
  - MATCH,PROXY                  # 剩余全部走代理

# --------- 性能与安全 ---------
dialer:
  disable-keep-alive: false
  tcp-keep-alive: 30

experimental:
  ignore-resolve-fail: true      # 忽略个别 DNS 解析失败，加速启动
  profiling: false
